services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-handson-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pg.sql:/docker-entrypoint-initdb.d/00_init.sql:ro

volumes:
  postgres_data:
